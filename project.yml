name: FreewindSwiftUIDebugBridge
options:
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 6.2
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "1.0"
targets:
  FreewindSwiftUIDebugBridge:
    type: framework
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/FreewindSwiftUIDebugBridge
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: li.freewind.FreewindSwiftUIDebugBridge
        GENERATE_INFOPLIST_FILE: YES
        DEFINES_MODULE: YES
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
  FreewindSwiftUIDebugBridgeDemoApp:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    productName: FreewindSwiftUIDebugBridgeDemoApp
    sources:
      - path: DemoApp
    dependencies:
      - target: FreewindSwiftUIDebugBridge
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: li.freewind.FreewindSwiftUIDebugBridgeDemoApp
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
schemes:
  FreewindSwiftUIDebugBridgeDemoApp:
    build:
      targets:
        FreewindSwiftUIDebugBridgeDemoApp: all
    run:
      config: Debug
    archive:
      config: Release
